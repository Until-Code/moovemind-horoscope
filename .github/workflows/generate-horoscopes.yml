name: Générer les horoscopes du jour

on:
  schedule:
    # 03:20 UTC chaque jour — même horaire que l'ancien projet kayoo123/astroo-api
    - cron: "20 3 * * *"
  workflow_dispatch: {} # permet de le lancer manuellement depuis l'onglet Actions

permissions:
  contents: write # nécessaire pour committer docs/*.json automatiquement

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Générer les fichiers JSON
        run: node scripts/generate-horoscopes.mjs

      - name: Commit et push si changement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/*.json
          if git diff --cached --quiet; then
            echo "Rien de nouveau à publier."
          else
            git commit -m "chore: horoscopes du $(date -u +'%Y-%m-%d')"
            git push
          fi
